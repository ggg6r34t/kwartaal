name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history, not just the latest commit — a secret committed
          # and later removed is still a leaked secret; gitleaks needs the
          # full log to catch that, not just a diff of HEAD.
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run lint

      - run: npm run format:check

      - name: Token-discipline check
        run: npm run token-check

      - name: Brand-hygiene check (no cross-product mentions)
        run: npm run brand-check

      - run: npm run build:web

      - name: Install Playwright browsers (chromium)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Accessibility scan (axe-core, marketing site)
        run: npm run test:a11y

      - name: wrangler deploy --dry-run (API)
        working-directory: apps/api
        run: npx wrangler deploy --dry-run
