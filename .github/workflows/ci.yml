name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history, not just the latest commit — a secret committed
          # and later removed is still a leaked secret; gitleaks needs the
          # full log to catch that, not just a diff of HEAD.
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run lint

      - run: npm run format:check

      - name: Token-discipline check
        run: npm run token-check

      - name: Brand-hygiene check (no cross-product mentions)
        run: npm run brand-check

      - run: npm run build:web

      - name: Install Playwright browsers (chromium)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Accessibility scan (axe-core, marketing site)
        run: npm run test:a11y

      - name: wrangler deploy --dry-run (API)
        working-directory: apps/api
        run: npx wrangler deploy --dry-run

  deploy-pages:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - run: npm ci

      - run: npm run build:web

      # Both kwartaal-staging and kwartaal-production are Direct Upload
      # Pages projects — Cloudflare's API refuses to convert a Direct
      # Upload project's `source` to a Git connection after the fact
      # (error 8000069), so `wrangler pages deploy` on green is the actual
      # push-to-live mechanism here, not GitHub's native Pages
      # integration. See docs/deploy-runbook.md.
      - name: Deploy staging (Pages)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # `wrangler pages` ignores wrangler.toml's account_id entirely
          # (unlike d1/r2/queues, which read it fine) and needs this as an
          # actual env var — not secret, same value already committed in
          # apps/api/wrangler.toml. Confirmed the hard way: this step
          # failed with a "/memberships ... Authentication error" without
          # it, the exact same failure mode documented in PROGRESS.md's
          # "Environment" section for local `wrangler pages` use.
          CLOUDFLARE_ACCOUNT_ID: 147db6fed4f442dd3eb80aae7701ce8a
        run: |
          cp deploy/wrangler.staging.toml wrangler.toml
          npx wrangler pages deploy dist --branch=main --commit-dirty=true
          rm wrangler.toml

      - name: Deploy production (Pages)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 147db6fed4f442dd3eb80aae7701ce8a
        run: |
          cp deploy/wrangler.production.toml wrangler.toml
          npx wrangler pages deploy dist --branch=main --commit-dirty=true
          rm wrangler.toml
