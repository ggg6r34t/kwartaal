name = "kwartaal-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
# Pinned to skip wrangler's account auto-discovery (/memberships), which a
# scoped API token can't complete even when it has real per-resource
# permissions — see PROGRESS.md's "Environment" section.
account_id = "147db6fed4f442dd3eb80aae7701ce8a"

# ─── Default environment (local dev) ──────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "kwartaal"
database_id = "b3db5d28-6742-4001-953d-f41215fda024"
# Migrations live in packages/db, not next to the Worker.
migrations_dir = "../../packages/db/migrations"

[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "kwartaal-storage"

[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "kwartaal-backups"

[[queues.producers]]
queue = "kwartaal-reminders"
binding = "REMINDER_QUEUE"

[[queues.consumers]]
queue = "kwartaal-reminders"
max_batch_size = 10
max_retries = 3

[[queues.producers]]
queue = "kwartaal-exports"
binding = "EXPORT_QUEUE"

[[queues.consumers]]
queue = "kwartaal-exports"
max_batch_size = 5
max_retries = 3

# Browser Rendering — print-to-PDF of handoff/annual summaries only (Pillar 4).
# Requires the account to have Browser Rendering enabled; confirmed wired
# correctly in Pillar 4 (fails gracefully to ExportJob status "failed" when
# unavailable, as it is in local `wrangler dev` — see PROGRESS.md) but not
# yet exercised against a real deployed Browser Rendering binding.
[browser]
binding = "BROWSER"

# Hourly reminder fan-out (the product's heartbeat) + weekly logical DB
# backup export. The scheduled() handler dispatches on event.cron.
[triggers]
crons = ["0 * * * *", "0 3 * * 7"]

[vars]
ENVIRONMENT = "development"
BETTER_AUTH_URL = "http://localhost:8787"
APP_ORIGIN = "http://localhost:5173"
EMAIL_FROM = "Kwartaal <no-reply@send.kwartaal.example>"
# No Stripe test account exists yet (BLOCKED, see PROGRESS.md) — checkout
# degrades to a clear "billing-not-configured" error until these + the
# STRIPE_SECRET_KEY/STRIPE_WEBHOOK_SECRET secrets are real.
STRIPE_PRICE_MONTHLY = "REPLACE_WITH_STRIPE_PRICE_MONTHLY"
STRIPE_PRICE_ANNUAL = "REPLACE_WITH_STRIPE_PRICE_ANNUAL"

# ─── Staging ───────────────────────────────────────────────────────────────
# Mirrors the account's existing per-environment layout (see docs/deploy-runbook.md /
# PROGRESS.md's "Environment" section): kwartaal-api-staging is a Worker
# with no custom domain — it's the same-origin proxy's upstream only, the
# browser never calls it directly, so its workers.dev hostname is fine as
# BETTER_AUTH_URL. The Pages project (kwartaal-staging, no Git connection,
# manual-wrangler-deploy) fronts staging.kwartaal.app. Resource names below
# follow the -staging suffix convention; R2 buckets and Queues still need
# real provisioning (the wrangler token available in this environment lacks
# account-level permissions to list or create them — see PROGRESS.md).
# BETTER_AUTH_URL's exact workers.dev hostname is only known after the
# first real `wrangler deploy --env staging` (it includes the account's
# subdomain, e.g. kwartaal-api-staging.<subdomain>.workers.dev).

[env.staging]
name = "kwartaal-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
BETTER_AUTH_URL = "https://kwartaal-api-staging.ykn-ghyorka.workers.dev"
# Both trusted: staging.kwartaal.app is the intended custom domain (not yet
# attached), the .pages.dev URL is the actually-reachable origin until it
# is — drop the .pages.dev entry once the custom domain is live.
APP_ORIGIN = "https://staging.kwartaal.app,https://kwartaal-staging.pages.dev"
EMAIL_FROM = "Kwartaal <no-reply@send.kwartaal.example>"
# Staging email safety hard rule (PROGRESS.md's "Environment" section):
# comma-separated recipient allow-list — anything not on it is logged, not
# sent (see email/resend.ts's isAllowedRecipient). Unset = allow nothing.
EMAIL_ALLOWLIST = "REPLACE_WITH_STAGING_EMAIL_ALLOWLIST"
STRIPE_PRICE_MONTHLY = "REPLACE_WITH_STRIPE_PRICE_MONTHLY"
STRIPE_PRICE_ANNUAL = "REPLACE_WITH_STRIPE_PRICE_ANNUAL"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "kwartaal-staging"
database_id = "1f6143ea-11e3-444c-88b0-f95253669a78"
migrations_dir = "../../packages/db/migrations"

[[env.staging.r2_buckets]]
binding = "RECEIPTS"
bucket_name = "kwartaal-storage-staging"

[[env.staging.r2_buckets]]
binding = "BACKUPS"
bucket_name = "kwartaal-backups-staging"

[[env.staging.queues.producers]]
queue = "kwartaal-reminders-staging"
binding = "REMINDER_QUEUE"

[[env.staging.queues.consumers]]
queue = "kwartaal-reminders-staging"
max_batch_size = 10
max_retries = 3

[[env.staging.queues.producers]]
queue = "kwartaal-exports-staging"
binding = "EXPORT_QUEUE"

[[env.staging.queues.consumers]]
queue = "kwartaal-exports-staging"
max_batch_size = 5
max_retries = 3

[env.staging.browser]
binding = "BROWSER"

[env.staging.triggers]
crons = ["0 * * * *", "0 3 * * 7"]

# ─── Production ────────────────────────────────────────────────────────────
# Explicit block per non-negotiable #8 (never let staging double as prod).
# api.kwartaal.app is the same-origin proxy's upstream only, per the same
# topology — the Pages project (kwartaal-production, no Git connection,
# manual-wrangler-deploy) fronts kwartaal.app and is what the browser
# actually talks to. No EMAIL_ALLOWLIST here — production has no allow-list
# by design (see email/resend.ts). R2/queue names follow the -production
# suffix convention; actual provisioning is still needed (see staging's
# comment above — same token-permission blocker).

[env.production]
name = "kwartaal-api-production"
routes = [{ pattern = "api.kwartaal.app", custom_domain = true }]

[env.production.vars]
ENVIRONMENT = "production"
BETTER_AUTH_URL = "https://api.kwartaal.app"
# Both trusted: kwartaal.app is the intended Pages custom domain (not yet
# attached — dashboard-only, see PROGRESS.md), the .pages.dev URL is the
# actually-reachable origin until it is — drop the .pages.dev entry once
# the custom domain is live.
APP_ORIGIN = "https://kwartaal.app,https://kwartaal-production.pages.dev"
EMAIL_FROM = "Kwartaal <no-reply@send.kwartaal.example>"
STRIPE_PRICE_MONTHLY = "REPLACE_WITH_STRIPE_PRICE_MONTHLY"
STRIPE_PRICE_ANNUAL = "REPLACE_WITH_STRIPE_PRICE_ANNUAL"

[[env.production.d1_databases]]
binding = "DB"
database_name = "kwartaal-production"
database_id = "0bea5c64-71c2-4d0a-965f-43b213deb4a9"
migrations_dir = "../../packages/db/migrations"

[[env.production.r2_buckets]]
binding = "RECEIPTS"
bucket_name = "kwartaal-storage-production"

[[env.production.r2_buckets]]
binding = "BACKUPS"
bucket_name = "kwartaal-backups-production"

[[env.production.queues.producers]]
queue = "kwartaal-reminders-production"
binding = "REMINDER_QUEUE"

[[env.production.queues.consumers]]
queue = "kwartaal-reminders-production"
max_batch_size = 10
max_retries = 3

[[env.production.queues.producers]]
queue = "kwartaal-exports-production"
binding = "EXPORT_QUEUE"

[[env.production.queues.consumers]]
queue = "kwartaal-exports-production"
max_batch_size = 5
max_retries = 3

[env.production.browser]
binding = "BROWSER"

[env.production.triggers]
crons = ["0 * * * *", "0 3 * * 7"]
