# Cloudflare Pages project config for kwartaal-production — see
# wrangler.staging.toml's comment for the copy-deploy-remove procedure and
# why it's necessary. From apps/web:
#   cp deploy/wrangler.production.toml wrangler.toml
#   npx wrangler pages deploy dist --branch=main
#   rm wrangler.toml
name = "kwartaal-production"
pages_build_output_dir = "dist"
compatibility_date = "2024-12-18"

[[services]]
binding = "API"
service = "kwartaal-api-production"
